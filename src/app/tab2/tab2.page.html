<ion-header>
  <ion-toolbar>
    <ion-title>Města</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-input [(ngModel)]="city" placeholder="Přidat město (např. Ostrava)"></ion-input>
    <ion-button slot="end" (click)="add()">Přidat</ion-button>
  </ion-item>

  <ion-list>
    <ion-item-sliding *ngFor="let c of cities">
      <ion-item button (click)="setActive(c)">
        <ion-label>
          <h2>{{ c }}</h2>
          <p *ngIf="c === activeCity">Aktivní</p>
        </ion-label>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="remove(c)">Smazat</ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>
</ion-content>
