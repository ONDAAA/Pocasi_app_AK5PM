<ion-header translucent="true">

  <ion-toolbar class="search-toolbar">
    <ion-searchbar
      class="searchbar"
      placeholder="Hledat město…"
      [value]="query"
      (ionInput)="onSearchChange($event)"
      (ionClear)="clearSearch()"
      enterkeyhint="search"
      inputmode="search"
    ></ion-searchbar>

    <ion-buttons slot="end" class="add-btn">
      <ion-button (click)="addCityFromQuery()" [disabled]="!query?.trim()">
        Přidat
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <ion-toolbar
    class="suggest-toolbar"
    *ngIf="(suggestions && suggestions.length) || searching"
  >
    <ion-list class="suggest-list" lines="none">
      <ion-item
        *ngIf="searching"
        class="suggest-item"
        detail="false"
        button="false"
      >
        <ion-spinner name="dots" slot="start"></ion-spinner>
        <ion-label>Hledám…</ion-label>
      </ion-item>

      <ion-item
        *ngFor="let s of suggestions"
        class="suggest-item"
        button="true"
        detail="false"
        (click)="pickSuggestion(s.name)"
      >
        <ion-label>
          <div class="s-name">{{ s.name }}</div>
          <div class="s-sub" *ngIf="s.region || s.country">
            {{ s.region }}<span *ngIf="s.region && s.country">, </span>{{ s.country }}
          </div>
        </ion-label>
      </ion-item>
    </ion-list>
  </ion-toolbar>

</ion-header>

<ion-content fullscreen="true" class="tab2-content">
  
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  
   <div class="cards">
    <ion-item-sliding
      class="sliding-wrap"
      *ngFor="let c of items; trackBy: trackByCity"
      (ionDrag)="onSlidingDrag($event)"
    >
      <!-- červená delete akce -->
      <ion-item-options side="end" class="delete-options">
        <ion-item-option
          color="danger"
          class="delete-option"
          (click)="remove(c.name)"
        >
          <ion-icon name="trash-outline"></ion-icon>
        </ion-item-option>
      </ion-item-options>

      
      <ion-item class="sliding-item" lines="none">
        <div class="city-card" (click)="openCity(c)">
          <div class="bg"></div>

          <div class="row top">
            <div class="left">
              <div class="city">{{ c.name }}</div>
              
            </div>

            <div class="right">
              <div class="temp">{{ c.temp }}°</div>
            </div>
          </div>

          <div class="row bottom">
            <div class="cond">
              <ion-icon *ngIf="c.warning" name="warning-outline" class="warn"></ion-icon>
              <span>{{ c.condition }}</span>
            </div>

            <div class="hilow">
              <span>H:{{ c.high }}°</span>
              <span class="sep"></span>
              <span>L:{{ c.low }}°</span>
            </div>
          </div>

         
          <div class="actions" (click)="$event.stopPropagation()">
            <ion-button fill="clear" size="small" (click)="setActive(c.name)">
              <ion-icon name="home-outline"></ion-icon>
            </ion-button>
          </div>
        </div>
      </ion-item>
    </ion-item-sliding>

    <div class="empty" *ngIf="!items.length">
      <div class="empty-title">Zatím tu nic nemáš</div>
      <div class="empty-sub">Přidej město nahoře přes vyhledávání.</div>
    </div>
  </div>
</ion-content>
