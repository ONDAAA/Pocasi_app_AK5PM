<ion-header>
  <ion-toolbar>
    <ion-title>Počasí</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen="true">
  <div class="top-panel ion-padding">
    <ion-item lines="full">
      <ion-label position="stacked">Město</ion-label>
      <ion-input
        [(ngModel)]="city"
        placeholder="Např. Praha"
        (keyup.enter)="searchWeather()"
        clearInput="true"
      ></ion-input>
    </ion-item>

    <ion-button expand="block" class="ion-margin-top" (click)="searchWeather()">
      Hledat
    </ion-button>
  </div>

  <div class="results ion-padding">
    <ion-card *ngIf="weather">
      <ion-card-header>
        <ion-card-title>{{ weather.location.name }}</ion-card-title>
        <ion-card-subtitle>
          {{ weather.current.temp_c }} °C · {{ weather.current.condition.text }}
        </ion-card-subtitle>
      </ion-card-header>
    </ion-card>
  </div>
</ion-content>
