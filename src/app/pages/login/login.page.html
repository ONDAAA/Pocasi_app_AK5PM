<ion-content fullscreen="true" class="auth-content">
  <div class="auth-wrap">
    <div class="hero">
      <div class="hero-icon">
        <ion-icon name="log-in-outline" aria-hidden="true"></ion-icon>
      </div>

      <div class="hero-text">
        <div class="hero-title">Přihlásit se</div>
        <div class="hero-sub">
          Přístup k uloženým městům a nastavení.
        </div>
      </div>
    </div>

    <ion-card class="glass-card">
      <ion-card-content>
        <ion-item class="glass-item" lines="none">
          <ion-input
            label="Email"
            labelPlacement="stacked"
            [(ngModel)]="email"
            type="email"
            inputmode="email"
            autocomplete="email"
            enterkeyhint="next"
          ></ion-input>
        </ion-item>

        <ion-item class="glass-item" lines="none">
          <ion-input
            label="Heslo"
            labelPlacement="stacked"
            [(ngModel)]="password"
            type="password"
            autocomplete="current-password"
            enterkeyhint="done"
          ></ion-input>
        </ion-item>

        <div class="err" *ngIf="error">
          <ion-icon name="alert-circle-outline"></ion-icon>
          <span>{{ error }}</span>
        </div>

        <ion-button
          class="primary-btn"
          expand="block"
          (click)="doLogin()"
          [disabled]="loading"
        >
          <ion-spinner *ngIf="loading" name="dots"></ion-spinner>
          <span *ngIf="!loading">Přihlásit</span>
        </ion-button>

        <ion-button
          class="secondary-btn"
          expand="block"
          fill="outline"
          (click)="forgotPassword()"
          [disabled]="loading"
        >
          Zapomenuté heslo
        </ion-button>

        <ion-button
          class="link-btn"
          expand="block"
          fill="clear"
          routerLink="/register"
          [disabled]="loading"
        >
          Nemáš účet? Registrovat
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
