<ion-header>
  <ion-toolbar>
    <ion-title>Počasí</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-text>
    <h2>Pokračovat</h2>
    <p>Vyber si, jak chceš aplikaci používat.</p>
  </ion-text>

  <ion-button expand="block" (click)="goLogin()">Přihlásit se</ion-button>
  <ion-button expand="block" fill="outline" (click)="goRegister()">Registrovat</ion-button>

  <ion-item lines="none" style="margin-top: 12px;"></ion-item>

  <ion-button expand="block" color="medium" (click)="continueAsGuest()">
    Pokračovat bez účtu
  </ion-button>
</ion-content>
