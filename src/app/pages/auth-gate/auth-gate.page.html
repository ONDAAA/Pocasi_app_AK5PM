
<ion-content fullscreen="true" class="gate-content">
  <div class="wrap">
    <div class="hero">
      <div class="hero-icon">
        <ion-icon name="partly-sunny-outline"></ion-icon>
      </div>

      <div class="hero-text">
        <div class="h1">Počasí</div>
        <div class="p">
          Ondřej Zemánek · AK5PM · 2026
        </div>
      </div>
    </div>

    <div class="glass-card">
      <div class="bg"></div>

      <div class="card-head">
        <div class="card-title">Účet</div>
        <div class="card-sub">Synchronizace měst a nastavení mezi zařízeními</div>
      </div>

      <div class="card-body btn-col">
        <ion-button expand="block" class="btn-primary" (click)="goLogin()">
          Přihlásit se
        </ion-button>

        <ion-button expand="block" fill="outline" class="btn-outline" (click)="goRegister()">
          Registrovat
        </ion-button>
      </div>
    </div>

    <div class="glass-card alt">
      <div class="bg"></div>

      <div class="card-head">
        <div class="card-title">Bez účtu</div>
        <div class="card-sub">Data se ukládají jen do tohoto zařízení</div>
      </div>

      <div class="card-body">
        <ion-button expand="block" class="btn-secondary" (click)="continueAsGuest()">
          Pokračovat bez účtu
        </ion-button>

        <div class="hint">
          Jde změnit kdykoliv v nastavení.
        </div>
      </div>
    </div>

   
  </div>
</ion-content>
